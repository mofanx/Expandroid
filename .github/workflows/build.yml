name: Build Expandroid

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-dotnet:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up .NET 9
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install .NET MAUI Workload
      run: dotnet workload install maui-android

    - name: Decode Keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/expandroid.jks

    - name: Restore Dependencies
      run: dotnet restore src/Expandroid.csproj

    - name: Build Debug
      run: dotnet build src/Expandroid.csproj -c Debug -f net9.0-android35.0 --no-restore

    - name: Build Release
      run: dotnet build src/Expandroid.csproj -c Release -f net9.0-android35.0 --no-restore
      env:
        KEYSTORE_PATH: /tmp/expandroid.jks
        KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASS: ${{ secrets.KEY_PASS }}

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: dotnet-debug-build
        path: |
          src/bin/Release/net9.0-android35.0/*.apk
          src/bin/Debug/net9.0-android35.0/*.apk
